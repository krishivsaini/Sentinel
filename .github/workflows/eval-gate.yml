# Faithfulness gate (§13) — engineering-signal #3 — implemented in Phase 4, Day 11.
#
# On every PR: install deps, run a representative SUBSET of the eval (config.ci_eval_subset_size),
# compute mean faithfulness, and FAIL the build if it drops below config.faithfulness_threshold.
# The full eval runs locally/on-demand; the CI subset stays small to cost cents and stay under
# Gemini free-tier RPM/RPD (NFR-6). GOOGLE_API_KEY is a repository secret (FR-CI4).
#
# STUB: trigger is workflow_dispatch (manual) until run_eval.py exists (Phase 3), so this does
# not post a misleading red check during scaffolding. Phase 4 switches the trigger to:
#   on:
#     pull_request:
#       branches: [main]

name: eval-gate

on:
  workflow_dispatch: {}

jobs:
  faithfulness-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --frozen
      - name: Run eval subset + enforce faithfulness gate
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # TODO(Phase 4, Day 11): run_eval must exit non-zero when mean faithfulness < threshold,
          # and print the metric summary to the job output (FR-CI2, FR-CI3).
          uv run python -m sentinel.eval.run_eval --subset 25
